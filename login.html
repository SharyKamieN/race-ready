<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RACE READY — Logowanie</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100%; background: #0A0C0F; color: #F0F4FF;
      font-family: Arial, Helvetica, sans-serif;
      display: flex; align-items: center; justify-content: center;
    }
    .wrapper { display: flex; flex-direction: column; align-items: center; gap: 0; }
    .box {
      background: #111418; border: 1.5px solid #1E2530;
      border-radius: 16px; padding: 40px 44px 36px;
      width: 100%; max-width: 380px;
      box-shadow: 0 0 60px rgba(0,200,255,0.06);
    }
    .logo {
      font-family: "Arial Black", Arial, sans-serif;
      font-weight: 900; font-size: 22px;
      letter-spacing: 0.1em; color: #00C8FF;
      text-align: center; margin-bottom: 4px;
    }
    .sub {
      font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
      color: #7A8090; text-align: center; margin-bottom: 32px;
    }
    label {
      display: flex; flex-direction: column; gap: 6px;
      font-size: 12px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: #7A8090; margin-bottom: 16px;
    }
    input {
      background: #181C22; border: 1.5px solid #2A3040; border-radius: 8px;
      color: #F0F4FF; font-size: 16px; padding: 12px 14px; outline: none;
      transition: border-color 0.2s; font-family: Arial, sans-serif;
      letter-spacing: 0.04em;
    }
    input:focus { border-color: #00C8FF; }
    .btn {
      width: 100%; padding: 14px; margin-top: 8px;
      background: #00C8FF; border: none; border-radius: 8px;
      color: #000; font-family: "Arial Black", Arial, sans-serif;
      font-weight: 900; font-size: 15px; letter-spacing: 0.12em;
      cursor: pointer; text-transform: uppercase; transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .err {
      background: rgba(220,30,30,0.15); border: 1px solid #FF2222;
      border-radius: 8px; padding: 10px 14px; margin-top: 14px;
      font-size: 13px; color: #FF4444; text-align: center;
      display: none;
    }
    .lock { text-align: center; font-size: 36px; margin-bottom: 20px; }
  

  .powered-top {
    text-align: center; margin-bottom: 18px;
    opacity: 0.55; transition: opacity 0.3s;
  }
  .powered-top:hover { opacity: 0.85; }
  .powered-top span {
    font-size: 10px; font-weight: 700; letter-spacing: 0.22em;
    text-transform: uppercase; color: #fff;
    text-shadow: 0 0 12px rgba(255,255,255,0.6), 0 0 28px rgba(255,255,255,0.25);
  }
</style>
</head>
<body>
<div class="wrapper">
<div class="powered-top"><span>Powered by LIVEMOTION</span></div>
<div class="box">
  <div class="lock">🔒</div>
  <div class="logo">RACE READY</div>
  <div class="sub">Panel Administratora</div>

  <div id="loginForm">
  <label>Login
    <input type="text" id="loginInput" placeholder="login" autocomplete="username">
  </label>
  <label>Hasło
    <input type="password" id="passInput" placeholder="••••••••" autocomplete="current-password">
  </label>
  <button class="btn" id="submitBtn" onclick="doLogin()">Zaloguj się</button>
  <div class="err" id="errBox"></div>
</div>

  <div id="resetForm" style="display:none;">
    <div class="sub" style="margin-bottom:16px;">Podaj email powiązany z kontem</div>
    <label>Email
      <input type="email" id="resetEmail" placeholder="twoj@email.com" autocomplete="email">
    </label>
    <div id="resetCodeSection" style="display:none;">
      <label style="margin-top:8px;">Kod z maila (6 cyfr)
        <input type="text" id="resetCode" placeholder="123456" maxlength="6" style="letter-spacing:0.3em;font-size:20px;text-align:center;">
      </label>
      <label style="margin-top:8px;">Nowe hasło
        <input type="password" id="resetNewPwd" placeholder="Nowe hasło">
      </label>
    </div>
    <div id="resetMsg" style="font-size:12px;margin:8px 0;min-height:18px;"></div>
    <button class="btn" id="resetBtn" onclick="handleReset()">Wyślij kod</button>
    <div style="text-align:center;margin-top:12px;">
      <a href="#" onclick="showLogin()" style="color:#7A8090;font-size:12px;">← Wróć do logowania</a>
    </div>
  </div>

</div>

<script>
  // Allow Enter key
  document.getElementById('passInput').addEventListener('keydown', function(e){
    if(e.key === 'Enter') doLogin();
  });
  document.getElementById('loginInput').addEventListener('keydown', function(e){
    if(e.key === 'Enter') document.getElementById('passInput').focus();
  });

  function doLogin() {
    var login = document.getElementById('loginInput').value.trim();
    var pass  = document.getElementById('passInput').value;
    var btn   = document.getElementById('submitBtn');
    var err   = document.getElementById('errBox');

    if (!login || !pass) {
      err.textContent = 'Wpisz login i hasło.';
      err.style.display = 'block'; return;
    }

    btn.disabled = true;
    btn.textContent = 'Logowanie...';
    err.style.display = 'none';

    fetch('/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({login: login, password: pass})
    })
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (d.ok) {
        window.location.href = '/admin';
      } else {
        err.textContent = d.error || 'Błędny login lub hasło.';
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Zaloguj się';
        document.getElementById('passInput').value = '';
        document.getElementById('passInput').focus();
      }
    })
    .catch(function(){
      err.textContent = 'Błąd połączenia z serwerem.';
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Zaloguj się';
    });
  }

var resetStep = 0;

function showReset() {
  document.querySelector('.lock').style.display = 'none';
  document.querySelector('.logo').textContent = 'RESET HASŁA';
  document.getElementById('loginForm').style.display = 'none';
  document.getElementById('resetForm').style.display = 'block';
  resetStep = 0;
}

function showLogin() {
  document.querySelector('.lock').style.display = '';
  document.querySelector('.logo').textContent = 'RACE READY';
  document.getElementById('loginForm').style.display = 'block';
  document.getElementById('resetForm').style.display = 'none';
}

async function handleReset() {
  if (resetStep === 0) {
    // Step 1: send code
    var email = document.getElementById('resetEmail').value.trim();
    if (!email) return;
    document.getElementById('resetBtn').disabled = true;
    document.getElementById('resetMsg').style.color = '#7A8090';
    document.getElementById('resetMsg').textContent = 'Wysyłanie...';
    var r = await fetch('/api/reset-request', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email: email})
    });
    var d = await r.json();
    document.getElementById('resetBtn').disabled = false;
    document.getElementById('resetMsg').textContent = d.msg || 'Wysłano';
    document.getElementById('resetMsg').style.color = '#00EE55';
    document.getElementById('resetCodeSection').style.display = 'block';
    document.getElementById('resetBtn').textContent = 'Zmień hasło';
    resetStep = 1;
  } else {
    // Step 2: verify code + set new password
    var code   = document.getElementById('resetCode').value.trim();
    var newPwd = document.getElementById('resetNewPwd').value;
    if (!code || !newPwd) {
      document.getElementById('resetMsg').style.color = '#FF4444';
      document.getElementById('resetMsg').textContent = 'Wypełnij wszystkie pola';
      return;
    }
    document.getElementById('resetBtn').disabled = true;
    var r = await fetch('/api/reset-verify', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({code: code, newPassword: newPwd})
    });
    var d = await r.json();
    document.getElementById('resetBtn').disabled = false;
    if (d.ok) {
      document.getElementById('resetMsg').style.color = '#00EE55';
      document.getElementById('resetMsg').textContent = '✓ ' + d.msg;
      setTimeout(showLogin, 2000);
    } else {
      document.getElementById('resetMsg').style.color = '#FF4444';
      document.getElementById('resetMsg').textContent = d.error || 'Błąd';
    }
  }
}

</script>


</body>
</html>
